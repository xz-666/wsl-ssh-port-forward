# WSL SSH Port Forwarding Configuration File
# Copy this file to wsl-ssh-config.ini and modify values as needed

# ===============================
# WSL Configuration
# ===============================
# WSL distribution name (leave empty for auto-detect)
# Examples: Ubuntu-22.04, Debian, openSUSE-Leap-15.5
WSL_DISTRO=Ubuntu-22.04

# ===============================
# Port Configuration
# ===============================
# Windows listen port (the port you connect to from remote)
LISTEN_PORT=2222

# WSL internal SSH port (usually 22)
CONNECT_PORT=22

# Listen address:
# - 0.0.0.0 = Listen on all network interfaces (allows remote connections)
# - 127.0.0.1 = Listen on localhost only (local only)
LISTEN_ADDRESS=0.0.0.0

# ===============================
# ZeroTier Configuration (Optional)
# ===============================
# Enable ZeroTier IP display (1=enabled, 0=disabled)
USE_ZEROTIER=0

# Your ZeroTier assigned IP address (replace with your actual IP)
ZEROTIER_IP=YOUR_ZEROTIER_IP

# ===============================
# Advanced Configuration
# ===============================
# Check interval in seconds (how often to verify port is alive)
CHECK_INTERVAL=2

# Restart SSH service in WSL when port is lost (1=yes, 0=no)
RESTART_SSH=1

# Log file path (relative or absolute)
LOG_FILE=wsl-ssh-portforward.log
